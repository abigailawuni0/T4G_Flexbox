<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nku Pa Hair Products - Contact</title>
    <link rel="stylesheet" href="../src/style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="brand">
                <h1>Nku Pa Hair Products</h1>
            </div>
            <ul class="nav-links">
                <li><a href="../index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contact-section">
            <h2>Contact Us</h2>
            <div class="contact-content">
                <div class="contact-info">
                    <h3>Get in Touch</h3>
                    <p><strong>Phone:</strong> 0541705208</p>
                    <p><strong>Email:</strong> abigailawuni0@gmail.com</p>
                    <p><strong>Location:</strong> Accra, Ghana</p>
                    <a href="https://wa.me/233541705208" class="whatsapp-btn" target="_blank">Contact on WhatsApp</a>
                </div>
                <div class="contact-form">
                    <h3>Send us a Message</h3>
                    <form action="#" method="post">
                        <div class="form-group">
                            <label for="name">Name</label>
                            <input type="text" id="name" name="name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" name="message" rows="5" required></textarea>
                        </div>
                        <button type="submit" class="submit-btn">Send Message</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2023 Nku Pa Hair Products. All rights reserved.</p>
    </footer>
</body>
</html>
